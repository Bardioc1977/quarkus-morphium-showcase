<div class="er-diagram">
    <div class="er-entities {layout.orEmpty}">
        {#insert entities}{/insert}
    </div>
    <div class="er-legend">
        <span class="er-legend-item"><span class="er-legend-color er-color-entity"></span> @Entity</span>
        <span class="er-legend-item"><span class="er-legend-color er-color-embedded"></span> @Embedded</span>
        <span class="er-legend-item"><span class="er-legend-color er-color-reference"></span> @Reference</span>
    </div>
</div>
