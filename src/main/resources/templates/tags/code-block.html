<div class="code-card">
    <div class="code-card-header">
        <span class="code-card-title">{title}</span>
        <span class="code-card-lang tag tag-blue">{lang}</span>
        <button class="code-copy-btn btn btn-outline btn-sm" onclick="copyCode(this)">Copy</button>
    </div>
    <div class="code-block"><pre>{#insert content}{/insert}</pre></div>
</div>
