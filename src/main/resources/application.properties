# Quarkus Morphium Showcase Application
quarkus.application.name=quarkus-morphium-showcase

# MongoDB via Dev Services (auto-starts Testcontainer)
# Do NOT set quarkus.morphium.hosts - leave empty so Dev Services starts automatically
quarkus.morphium.database=morphium_showcase

# Dev Services configuration
quarkus.morphium.devservices.enabled=true
quarkus.morphium.devservices.image-name=mongo:8
quarkus.morphium.devservices.database-name=morphium_showcase
quarkus.morphium.devservices.replica-set=true

# Cache
quarkus.morphium.cache.read-cache-enabled=true
quarkus.morphium.cache.global-valid-time=60000

# Qute
quarkus.qute.property-not-found-strategy=output-original

# Dev mode
quarkus.live-reload.instrumentation=true
quarkus.http.port=8080

# Production profile (Docker)
%prod.quarkus.morphium.hosts=mongodb:27017
%prod.quarkus.morphium.database=morphium_showcase
%prod.quarkus.morphium.devservices.enabled=false

# Version info (displayed in sidebar and hero badge)
showcase.version.morphium=6.2.1-SNAPSHOT
showcase.version.extension=1.0.1-SNAPSHOT
