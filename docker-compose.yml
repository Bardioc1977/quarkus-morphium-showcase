services:
  mongodb:
    image: mongo:8
    command: ["--replSet", "rs0"]
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongodb:27017'}]}); }
        "
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  showcase:
    image: ghcr.io/bardioc1977/quarkus-morphium-showcase:latest
    ports:
      - "8080:8080"
    environment:
      QUARKUS_PROFILE: prod
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb-data:
