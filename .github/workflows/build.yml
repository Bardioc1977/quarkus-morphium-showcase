name: Build

on:
  workflow_dispatch:
  repository_dispatch:
    types: [dependency-updated]
  push:
    branches: ["main"]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/CODEOWNERS'
  pull_request:
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # morphium / quarkus-morphium are not yet on Maven Central — they are resolved
      # from the bundled local repo (lib/maven-repo), wired up as a file:// repository
      # in pom.xml. No GitHub Packages auth needed.
      - name: Build and test
        run: mvn -B verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'
          retention-days: 7
